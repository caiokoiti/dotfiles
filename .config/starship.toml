[fill]
symbol = ' '

[time]
disabled = false
format = '[$time]($style) '
time_format = "%H:%M"
style = "bold blue"

[git_metrics]
format = '([Ôû┤$added]($added_style))([Ôû┐$deleted]($deleted_style))'
added_style = 'italic dimmed green'
deleted_style = 'italic dimmed red'
ignore_submodules = true
disabled = false

# Replace the 'ÔØ»' symbol in the prompt with 'ÔŞ£'
[character] # The name of the module we are configuring is 'character'
success_symbol = '[ÔŞ£](bold green)' # The 'success_symbol' segment is being set to 'ÔŞ£' with the color 'bold green'
error_symbol = '[ÔŞ£](bold red)'

