# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Increase timeout for slow commands (like asdf shims)
command_timeout = 1000

# Inserts a blank line between shell prompts
add_newline = true

# Jetpack-style format with original icons
format = """($nix_shell$container$fill$git_metrics\n)$cmd_duration\
$hostname\
$localip\
$shlvl\
$shell\
$env_var\
$jobs\
$sudo\
$username\
$character"""

right_format = """
$singularity\
$kubernetes\
$directory\
$vcsh\
$fossil_branch\
